<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Personalizado Discord</title>
    <!-- Google Fonts for Discord-like sans font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Profile info -->
        <div class="profile-section">
            <div class="avatar-wrapper">
                <img id="avatar" class="avatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar">
                <div class="status-indicator"></div>
            </div>
            <h2>¡Hola, <span id="username">Usuario</span>!</h2>
            <p>Elige un color personalizado para destacar tu nombre en el servidor de Discord.</p>
        </div>

        <!-- Discord Live Chat Preview Mockup -->
        <div class="discord-preview-card">
            <div class="preview-badge">Vista Previa</div>
            <div class="discord-message">
                <img id="previewAvatar" class="discord-message-avatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar">
                <div class="discord-message-content">
                    <div class="discord-message-header">
                        <span id="previewUsername" class="discord-author">Usuario</span>
                        <span class="discord-timestamp">Hoy a las 12:00 PM</span>
                    </div>
                    <div class="discord-message-body">Así es como lucirá tu nombre en el chat del servidor. 🚀</div>
                </div>
            </div>
        </div>

        <!-- Color Picker & Inputs -->
        <div class="color-picker-section">
            <div class="color-picker-wrapper">
                <input type="color" id="colorPicker" value="#5865F2">
            </div>
            
            <div class="hex-input-wrapper">
                <span class="hash-prefix">#</span>
                <input type="text" id="hexInput" class="hex-input" value="5865F2" maxlength="6" placeholder="5865F2">
                <button id="btnCopyHex" class="btn-copy" title="Copiar HEX">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
            </div>
        </div>

        <!-- Operations Actions -->
        <div class="buttons">
            <button id="btnSave" class="btn-primary">
                <span>Guardar Color</span>
                <div class="spinner"></div>
            </button>
            <button id="btnRemove" class="btn-danger">
                <span>Restablecer</span>
                <div class="spinner"></div>
            </button>
        </div>

        <div id="status"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
